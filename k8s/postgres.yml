apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-postgres
  namespace: saas

spec:
  replicas: 1
  selector:
    matchLabels:
      app: saas-postgres
  template:
    metadata:
      labels:
        app: saas-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
          env:
          - name: POSTGRES_USER
            valueFrom:
              secretKeyRef:
                name: saas-secrets
                key: DATABASE_USER
          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: saas-secrets
                key: DATABASE_PASSWORD
          - name: POSTGRES_DB
            valueFrom:
              configMapKeyRef:
                name: saas-config
                key: DATABASE_NAME
          - name: POSTGRES_HOST
            valueFrom:
              configMapKeyRef:
                name: saas-config
                key: DATABASE_HOST
          - name: POSTGRES_PORT
            valueFrom:
              configMapKeyRef:
                name: saas-config
                key: DATABASE_PORT
                
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: saas-postgres
  namespace: saas
spec:
  selector:
    app: saas-postgres  
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
  