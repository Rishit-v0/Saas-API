services:
  - type: web
    name: saas-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saas-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false   # set manually from Upstash dashboard
      - key: SECRET_KEY
        generateValue: true   # Render generates a secure random value
      - key: OPENAI_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: CHROMA_PATH
        value: /data/chroma
      - key: ENVIRONMENT
        value: production
    disk:
      name: chroma-data
      mountPath: /data
      sizeGB: 1    # 1GB persistent volume for ChromaDB vectors

databases:
  - name: saas-postgres
    plan: free
    databaseName: saas_db
    user: saas_user