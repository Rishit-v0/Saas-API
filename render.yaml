# render.yaml
services:
  - type: web
    name: saas-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free                    # ← explicitly set free tier
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: ENVIRONMENT
        value: production
    # NO disk block — that was for ChromaDB which we removed
    # NO databases block — Neon handles that externally